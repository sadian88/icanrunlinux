services:
  database:
    image: pgvector/pgvector:pg17
    container_name: icanrunlinux-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-linux_compat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-linux_compat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icanrunlinux-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/${DB_NAME:-linux_compat}
      DB_HOST: database
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_NAME: ${DB_NAME:-linux_compat}
      EMBEDDINGS_API_URL: ${EMBEDDINGS_API_URL:-https://api.openai.com/v1/embeddings}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-text-embedding-3-small}
      EMBEDDINGS_DIMENSIONS: ${EMBEDDINGS_DIMENSIONS:-1536}
      LLM_API_URL: ${LLM_API_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek/deepseek-chat}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD:-0.5}
      AI_CACHE_THRESHOLD: ${AI_CACHE_THRESHOLD:-0.92}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-2}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-3600}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-10240}
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: icanrunlinux-web
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  pgdata:
